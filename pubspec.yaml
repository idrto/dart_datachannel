name: dart_datachannel
description: >-
  Dart FFI package over libdatachannel (no Flutter SDK dependency).
  Client-only, server-only, and hybrid WebRTC data-channel modes.
version: 0.1.0
homepage: https://github.com/idrto/dart_datachannel
repository: https://github.com/idrto/dart_datachannel
issue_tracker: https://github.com/idrto/dart_datachannel/issues

environment:
  sdk: ^3.5.0

dependencies:
  ffi: ^2.1.3
  meta: ^1.15.0

dev_dependencies:
  test: ^1.25.0
  ffigen: ^20.1.1
  lints: ^5.0.0

topics:
  - webrtc
  - ffi
  - datachannel
  - ollama
