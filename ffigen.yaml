# Run: dart run ffigen --config ffigen.yaml
name: DatachannelBindings
description: Auto-generated FFI bindings for fdc_ffi.h
output: 'lib/src/ffi/bindings.g.dart'
silence-enum-warning: true
headers:
  entry-points:
    - 'native/include/fdc_ffi.h'
  include-directives:
    - 'native/include/fdc_ffi.h'
compiler-opts:
  - '-Inative/include'
  - '-x'
  - 'c'
functions:
  include:
    - 'fdc_.*'
structs:
  include:
    - 'Fdc.*'
enums:
  include:
    - 'Fdc.*'
typedefs:
  include:
    - 'Fdc.*'
preamble: |
  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names
comments:
  style: any
  length: full
